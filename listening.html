<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fluento | Listening</title>
    <link rel="manifest" href="./pwa/manifest.json" />
    <meta name="theme-color" content="#6f42c1" />
    <link rel="stylesheet" href="./css/style.min.css" />
    <link rel="icon" href="./assets/ec logo.png.jpeg">
  </head>
  <body data-page="listening">
    <main class="app-shell">
      <header class="topbar">
      <div class="topbar-left">
        <button id="openTranslatorBtn" class="translator-chip" type="button" aria-label="Open translator">🌐</button>
        <h2>Listening Practice</h2>
      </div>
      <a class="profile-chip" href="./about.html">
        <img id="profileImg" src="./assets/avatar.svg" alt="Profile" />
      </a>
    </header>

      <div class="tabs">
        <button class="tab-btn active" data-tab="dailyPanel">Daily Listening Task</button>
        <button class="tab-btn" data-tab="extraPanel">Extra Listening Tasks</button>
      </div>

      <section id="dailyPanel" class="tab-panel active">
        <div class="card">
          <h3 id="dailyTitle" class="section-title"></h3>
          <p id="dailyMeta" class="muted"></p>
          <div class="video-wrap"><iframe id="dailyFrame" title="Daily Listening Video" allowfullscreen></iframe></div>
          <h4 style="margin:10px 0 0;">Key Vocabulary</h4>
          <div id="vocabWrap" class="chips"></div>
          <div class="task-meta" style="margin-top:12px;"><button id="markDoneBtn" class="btn btn-outline" style="width:auto;">Mark Complete</button></div>
          <p id="status" class="status"></p>
        </div>

        <div class="card" style="margin-top:12px;">
          <h3 class="section-title">Unlocked Listening Days</h3>
          <div id="backlog" class="list"></div>
        </div>
      </section>

      <section id="extraPanel" class="tab-panel">
        <div class="card">
          <h3 class="section-title">Extra Listening Tasks</h3>
          <div id="extraListeningList" class="list"></div>
        </div>
      </section>
    </main>

    <nav class="bottom-nav">
      <a class="nav-link" data-page="home" href="./dashboard.html"><span>🏠</span>Home</a>
      <a class="nav-link" data-page="speaking" href="./speaking.html"><span>🎙️</span>Speaking</a>
      <a class="nav-link" data-page="listening" href="./listening.html"><span>🎧</span>Listening</a>
      <a class="nav-link" data-page="extra" href="./extra.html"><span>✨</span>Extra</a>
      <a class="nav-link" data-page="about" href="./about.html"><span>👤</span>About</a>
    </nav>

    <script type="module" src="./js/listening.js"></script>
  </body>
</html>
